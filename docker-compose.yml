# 本地开发基础设施：MySQL + Redis + MinIO + RocketMQ + XXL-JOB Admin
services:
  mysql:
    image: mysql:8.0
    container_name: hysaas-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hysaas
      MYSQL_USER: hysaas
      MYSQL_PASSWORD: hysaas123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/V1__init.sql:/docker-entrypoint-initdb.d/V1__init.sql
      - ./sql/V2__xxl_job.sql:/docker-entrypoint-initdb.d/V2__xxl_job.sql
      - ./sql/V3__seed_enterprise_roles.sql:/docker-entrypoint-initdb.d/V3__seed_enterprise_roles.sql
      - ./sql/V4__seed_expert.sql:/docker-entrypoint-initdb.d/V4__seed_expert.sql
      - ./sql/V5__hotel_pay_extend.sql:/docker-entrypoint-initdb.d/V5__hotel_pay_extend.sql
      - ./sql/V6__seed_email_templates.sql:/docker-entrypoint-initdb.d/V6__seed_email_templates.sql
      - ./sql/V7__user_contact.sql:/docker-entrypoint-initdb.d/V7__user_contact.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hysaas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: hysaas-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: hysaas-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: hysaas-rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.2.0/conf/broker.conf
      - rocketmq_broker_data:/home/rocketmq/store
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: hysaas-xxl-job-admin
    ports:
      - "8088:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root123
        --xxl.job.accessToken=default_token
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rocketmq_broker_data:
