# 所有接口前缀 /api，与前端 vite proxy 一致
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: hysaas-server
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# Token 放 Header: Authorization: Bearer xxx
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
